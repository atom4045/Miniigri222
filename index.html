<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Subnautica 2D: Deep Dive</title>
    <style>
        body { margin: 0; overflow: hidden; background: linear-gradient(#004e92, #001a33, #000); font-family: sans-serif; touch-action: none; color: white; user-select: none; }
        canvas { display: block; }
        #ui { position: absolute; top: 10px; left: 10px; pointer-events: none; text-shadow: 1px 1px 2px #000; z-index: 5;}
        .bar { width: 160px; height: 12px; background: #333; border: 2px solid #fff; border-radius: 6px; box-shadow: 0 0 5px #0ff;}
        #ox-lvl { width: 100%; height: 100%; background: #00d4ff; transition: 0.1s; }
        .inv { font-size: 13px; background: rgba(0,0,0,0.6); padding: 8px; margin-top: 5px; border-radius: 5px; line-height: 1.5; border: 1px solid #555;}
        #warn { color: #ff4757; font-weight: bold; display: none; animation: blink 1s infinite; margin-top: 5px; }
        @keyframes blink { 50% { opacity: 0; } }
        #craft-btn { position: absolute; bottom: 20px; right: 20px; width: 65px; height: 65px; background: #ff9f43; color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 3px solid #fff; box-shadow: 0 0 10px #ff9f43; z-index: 10; cursor: pointer;}
        #menu { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,25,50,0.95); padding: 15px; border: 2px solid #00d4ff; display: none; text-align: left; border-radius: 10px; z-index: 20; width: 260px;}
        .c-item { border-bottom: 1px solid #444; padding-bottom: 10px; margin-bottom: 10px; font-size: 14px;}
        .c-item button { float: right; background: #2ed573; border: none; padding: 5px 10px; border-radius: 4px; font-weight: bold; cursor:pointer;}
        #joy-a { position: absolute; bottom: 30px; left: 30px; width: 110px; height: 110px; background: rgba(255,255,255,0.1); border-radius: 50%; border: 2px solid rgba(255,255,255,0.3); z-index: 10;}
        #joy-s { position: absolute; width: 50px; height: 50px; background: rgba(255,255,255,0.5); border-radius: 50%; top: 30px; left: 30px; box-shadow: 0 0 10px #fff;}
        #horror { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; justify-content: center; align-items: center; z-index: 100; }
    </style>
</head>
<body>
    <div id="ui">
        O2 <div class="bar"><div id="ox-lvl"></div></div>
        <div id="warn">⚠ ОПАСНАЯ ГЛУБИНА!</div>
        <div class="inv">
            ⚪ Металл: <span id="m">0</span> | 🟢 Кварц: <span id="q">0</span><br>
            🔴 Титан: <span id="t">0</span> | 🟡 Золото: <span id="g">0</span>
        </div>
    </div>
    <div id="joy-a"><div id="joy-s"></div></div>
    <div id="craft-btn">ПДА</div>
    
    <div id="menu">
        <h3 style="margin-top:0; color:#0ff;">Чертежи</h3>
        <div class="c-item"><b>Баллон V2</b><br><small>⚪x5, 🟢x3</small> <button onclick="c('ox')">Создать</button></div>
        <div class="c-item"><b>Мотор</b> (Скорость +)<br><small>🔴x4, 🟢x2</small> <button onclick="c('spd')">Создать</button></div>
        <div class="c-item" style="border:none;"><b>Корпус</b> (Анти-давление)<br><small>🔴x8, 🟡x3</small> <button onclick="c('hul')">Создать</button></div>
        <button onclick="this.parentElement.style.display='none'" style="width:100%; background:#ff4757; color:#fff; border:none; padding:8px; border-radius:5px; margin-top:5px;">Закрыть</button>
    </div>
    
    <div id="horror"><img src="https://media.tenor.com/1-A6u_L62xQAAAAi/hornet-hollow-knight.gif" style="width:100%; max-width:400px;"></div>
    <canvas id="c"></canvas>
    <script>
    const canvas = document.getElementById('c'); const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    
    let p = { x: canvas.width/2, y: 80, ox: 100, res: {m:0, q:0, t:0, g:0}, u: {ox:0, spd:0, hul:0} };
    let items = []; let joy = { a: false, mx: 0, my: 0 };
    let dangerDepth = canvas.height * 0.55; 

    let sec = { x: 10, y: canvas.height - 60, w: 50, h: 50 };

    function spawn() {
        let rnd = Math.random();
        let type = rnd > 0.95 ? 'g' : rnd > 0.7 ? 't' : rnd > 0.4 ? 'q' : 'm';
        let minY = type==='g' ? canvas.height-150 : type==='t' ? canvas.height/2 : type==='q' ? 150 : 80;
        let y = Math.random() * (canvas.height - minY) + minY;
        items.push({ x: Math.random()*(canvas.width-20)+10, y: y, t: type });
    }
    for(let i=0; i<30; i++) spawn();

    const area = document.getElementById('joy-a'); const stick = document.getElementById('joy-s');
    area.addEventListener('touchstart', () => joy.a = true);
    window.addEventListener('touchmove', (e) => {
        if(!joy.a) return;
        let t = e.touches[0]; let r = area.getBoundingClientRect();
        let dx = t.clientX - (r.left + 55), dy = t.clientY - (r.top + 55);
        let d = Math.min(Math.sqrt(dx*dx + dy*dy), 45); let a = Math.atan2(dy, dx);
        joy.mx = Math.cos(a) * (d/45); joy.my = Math.sin(a) * (d/45);
        stick.style.transform = `translate(${Math.cos(a)*d}px, ${Math.sin(a)*d}px)`;
    });
    window.addEventListener('touchend', () => { joy.a = false; joy.mx = 0; joy.my = 0; stick.style.transform = 'translate(0,0)'; });

    document.getElementById('craft-btn').onclick = () => document.getElementById('menu').style.display = 'block';
    
    function c(i) {
        let r = p.res;
        if(i==='ox' && r.m>=5 && r.q>=3 && !p.u.ox) { r.m-=5; r.q-=3; p.u.ox=1; alert('Баллон установлен!'); }
        else if(i==='spd' && r.t>=4 && r.q>=2 && !p.u.spd) { r.t-=4; r.q-=2; p.u.spd=1; alert('Мотор установлен!'); }
        else if(i==='hul' && r.t>=8 && r.g>=3 && !p.u.hul) { r.t-=8; r.g-=3; p.u.hul=1; alert('Корпус укреплен!'); }
        else { alert('Мало ресурсов или уже скрафчено!'); }
        updUI();
    }

    function updUI() {
        ['m','q','t','g'].forEach(id => document.getElementById(id).textContent = p.res[id]);
        document.getElementById('ox-lvl').style.width = p.ox + '%';
    }

    function draw() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        
        ctx.fillStyle = 'rgba(0,150,255,0.2)'; ctx.fillRect(0,0,canvas.width, 70);
        
        if(!p.u.hul) {
            ctx.fillStyle = 'rgba(255,0,0,0.05)'; 
            ctx.fillRect(0, dangerDepth, canvas.width, canvas.height - dangerDepth);
        }

        ctx.fillStyle = '#000'; ctx.fillRect(sec.x, sec.y, sec.w, sec.h);

        items.forEach((it, i) => {
            let color = it.t==='m'?'#bdc3c7':it.t==='q'?'#2ecc71':it.t==='t'?'#e74c3c':'#f1c40f';
            ctx.fillStyle = color; ctx.beginPath(); ctx.arc(it.x, it.y, 6, 0, 7); ctx.fill();
            ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(it.x-2, it.y-2, 2, 0, 7); ctx.fill();
            
            if(Math.hypot(p.x-it.x, p.y-it.y) < 30) { p.res[it.t]++; items.splice(i,1); spawn(); updUI(); }
        });

        let speed = p.u.spd ? 6.5 : 4;
        p.x = Math.max(20, Math.min(canvas.width - 20, p.x + joy.mx * speed));
        p.y = Math.max(20, Math.min(canvas.height - 20, p.y + joy.my * speed));

        let isDeep = p.y > dangerDepth && !p.u.hul;
        document.getElementById('warn').style.display = isDeep ? 'block' : 'none';
        
        let rate = (p.u.ox ? 0.04 : 0.08) * (isDeep ? 3 : 1);
        p.ox = p.y < 70 ? Math.min(100, p.ox + 2) : p.ox - rate;
        
        if(p.ox <= 0) { alert('Утонул! Сбор сброшен.'); p.ox=100; p.y=80; p.res={m:0,q:0,t:0,g:0}; updUI(); }
        updUI();

        if(p.x < sec.x+50 && p.y > sec.y) {
            document.getElementById('horror').style.display='flex';
            setTimeout(()=> location.reload(), 2500); return;
        }

        ctx.fillStyle = p.u.hul ? '#95a5a6' : '#f1c40f'; 
        ctx.beginPath(); ctx.ellipse(p.x, p.y, 22, 14, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#e67e22'; ctx.fillRect(p.x-28, p.y-4, 8, 8);
        ctx.fillStyle = '#3498db'; ctx.beginPath(); ctx.arc(p.x+8, p.y-3, 6, 0, Math.PI*2); ctx.fill();

        requestAnimationFrame(draw);
    }
    draw();
</script>
</body>
</html>
