<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Subnautica: Ice & Fire</title>
    <style>
        body { margin:0; overflow:hidden; background:#001a33; font-family:sans-serif; touch-action:none; color:#fff; user-select:none; }
        #ui { position:absolute; top:10px; left:10px; z-index:5; text-shadow:1px 1px 2px #000; pointer-events:none;}
        .bar { width:150px; height:12px; border:2px solid #fff; border-radius:6px; background:#333; margin-bottom:5px;}
        #ox { width:100%; height:100%; background:#00d4ff; transition:0.1s;}
        .inv { background:rgba(0,0,0,0.6); padding:5px; border-radius:5px; font-size:12px; pointer-events:auto;}
        .btn { width:60px; height:60px; border-radius:50%; position:absolute; font-weight:bold; border:2px solid #fff; z-index:10; display:flex; align-items:center; justify-content:center;}
        #joy-a { bottom:20px; left:20px; width:100px; height:100px; background:rgba(255,255,255,0.1); border-radius:50%; position:absolute; }
        #joy-s { width:40px; height:40px; background:rgba(255,255,255,0.5); border-radius:50%; position:absolute; top:30px; left:30px; }
        #btn-pda { bottom:20px; right:20px; background:#f39c12; color:#000; cursor:pointer;}
        #btn-atk { bottom:90px; right:20px; background:#e74c3c; display:none; cursor:pointer;}
        #menu { position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); background:rgba(0,25,50,0.95); padding:10px; border:2px solid #0ff; display:none; border-radius:10px; z-index:20; width:280px; max-height:80vh; overflow-y:auto;}
        .c-item { border-bottom:1px solid #444; padding:5px 0; font-size:12px;}
        .c-item button { float:right; background:#2ecc71; border:none; padding:5px; border-radius:3px; cursor:pointer;}
        #horror { position:fixed; top:0; left:0; width:100%; height:100%; background:#000; display:none; justify-content:center; align-items:center; z-index:100; }
    </style>
</head>
<body>
    <div id="ui">
        O2 <div class="bar"><div id="ox"></div></div>
        <div id="warn" style="color:#e74c3c; display:none; font-weight:bold;">⚠ АКУЛА!</div>
        <div class="inv">
            ⚪Мет:<span id="m">0</span> 🟢Квц:<span id="q">0</span> 🔴Тит:<span id="t">0</span><br>
            🟡Зол:<span id="g">0</span> 💎Лёд:<span id="c">0</span>
            <button onclick="port()" style="margin-top:5px;width:100%;background:#00d4ff;border:none;padding:5px;cursor:pointer;">Телепорт: Ледник (10🟡, 10🔴)</button>
        </div>
    </div>
    <div id="joy-a"><div id="joy-s"></div></div>
    <div class="btn" id="btn-pda" onclick="document.getElementById('menu').style.display='block'">ПДА</div>
    <div class="btn" id="btn-atk" onclick="atk()">БИТЬ</div>

    <div id="menu">
        <h3 style="margin:0 0 10px 0;color:#0ff;">Чертежи</h3>
        <div class="c-item"><b>Копьё</b> <small>⚪5,🟢5</small> <button onclick="cr('w1')">Создать</button></div>
        <div class="c-item"><b>Авто-Пушка</b> <small>🔴10,🟡5</small> <button onclick="cr('w2')">Создать</button></div>
        <div class="c-item"><b>Ракетница</b> <small>💎10,🟡10</small> <button onclick="cr('w3')">Создать</button></div>
        <div class="c-item"><b>Обогреватель</b> <small>🔴5,🟡2</small> <button onclick="cr('ht')">Создать</button></div>
        <button onclick="this.parentElement.style.display='none'" style="width:100%;margin-top:10px;padding:8px;background:#e74c3c;color:#fff;border:none;">Закрыть</button>
    </div>
    <div id="horror"><img src="https://upload.wikimedia.org/wikipedia/en/c/c5/Hollow_Knight_Hornet.png" style="width:80%;max-width:300px;"></div>
    <canvas id="cv"></canvas>
    <script>
    const cv = document.getElementById('cv'); const cx = cv.getContext('2d');
    cv.width = window.innerWidth; cv.height = window.innerHeight;
    
    let p = { x:cv.width/2, y:80, ox:100, res:{m:0,q:0,t:0,g:0,c:0}, u:{w:0,ht:0}, bio:0 };
    let items = [], sharks = [], bullets = [], exps = [];
    let joy = { a:false, x:0, y:0 }, frames = 0;
    let sec = { x:10, y:cv.height-60, s:40 };

    function rY() { return Math.random()*(cv.height-100)+100; }
    function spI() {
        let r=Math.random(), t;
        if(p.bio==1) t = r>0.7?'c':r>0.4?'t':'m';
        else t = r>0.9?'g':r>0.6?'t':r>0.3?'q':'m';
        items.push({ x:Math.random()*(cv.width-20)+10, y:rY(), t:t });
    }
    for(let i=0; i<30; i++) spI();

    const ja=document.getElementById('joy-a'), js=document.getElementById('joy-s');
    ja.ontouchstart=()=>joy.a=true;
    window.ontouchmove=(e)=>{
        if(!joy.a)return; let r=ja.getBoundingClientRect(), t=e.touches[0];
        let dx=t.clientX-(r.left+50), dy=t.clientY-(r.top+50), d=Math.min(Math.hypot(dx,dy),40), a=Math.atan2(dy,dx);
        joy.x=Math.cos(a)*(d/40); joy.y=Math.sin(a)*(d/40); js.style.transform=`translate(${Math.cos(a)*d}px,${Math.sin(a)*d}px)`;
    };
    window.ontouchend=()=>{ joy.a=false; joy.x=0; joy.y=0; js.style.transform='translate(0,0)'; };

    function cr(i){
        let r=p.res;
        if(i=='w1'&&r.m>=5&&r.q>=5&&p.u.w<1){ r.m-=5;r.q-=5;p.u.w=1;document.getElementById('btn-atk').style.display='flex'; alert('Копьё готово!');}
        else if(i=='w2'&&r.t>=10&&r.g>=5&&p.u.w<2){ r.t-=10;r.g-=5;p.u.w=2;document.getElementById('btn-atk').style.display='none'; alert('Пушка установлена!');}
        else if(i=='w3'&&r.c>=10&&r.g>=10&&p.u.w<3){ r.c-=10;r.g-=10;p.u.w=3; alert('Ракетница установлена!');}
        else if(i=='ht'&&r.t>=5&&r.g>=2&&!p.u.ht){ r.t-=5;r.g-=2;p.u.ht=1; alert('Обогреватель установлен!');}
        else alert('Мало ресурсов или уже есть!');
    }
    
    function port(){
        if(p.bio==0 && p.res.g>=10 && p.res.t>=10){ p.res.g-=10; p.res.t-=10; p.bio=1; items=[]; sharks=[]; for(let i=0;i<30;i++)spI(); alert('Ледник! Тут ОЧЕНЬ холодно!'); }
        else if(p.bio==1){ p.bio=0; items=[]; sharks=[]; for(let i=0;i<30;i++)spI(); }
        else alert('Собери 10 Золота и 10 Титана!');
    }

    function atk(){ if(p.u.w==1){ sharks.forEach((s,i)=>{ if(Math.hypot(p.x-s.x, p.y-s.y)<60) sharks.splice(i,1); }); }}

    function updUI(){
        ['m','q','t','g','c'].forEach(i=>document.getElementById(i).innerText=p.res[i]);
        document.getElementById('ox').style.width=Math.max(0,p.ox)+'%';
        document.getElementById('warn').style.display=sharks.length>0?'block':'none';
    }

    function draw(){
        frames++;
        cx.fillStyle = p.bio==1 ? '#8ab6d6' : '#001a33'; cx.fillRect(0,0,cv.width,cv.height);
        cx.fillStyle = p.bio==1 ? '#e0f7fa' : '#004e92'; cx.fillRect(0,0,cv.width,70);
        cx.fillStyle = '#000'; cx.fillRect(sec.x, sec.y, sec.s, sec.s);

        // Спавн акул (раз в 10 сек)
        if(frames%600==0 && sharks.length<3) sharks.push({ x:Math.random()>0.5?0:cv.width, y:rY() });
        
        // Авто-стрельба
        if(p.u.w>=2 && frames%50==0 && sharks.length>0){
            let s=sharks[0], a=Math.atan2(s.y-p.y, s.x-p.x);
            bullets.push({x:p.x, y:p.y, vx:Math.cos(a)*8, vy:Math.sin(a)*8, r:p.u.w==3});
        }

        // Ресурсы
        items.forEach((it,i)=>{
            cx.fillStyle = it.t=='m'?'#bdc3c7':it.t=='q'?'#2ecc71':it.t=='t'?'#e74c3c':it.t=='g'?'#f1c40f':'#00d4ff';
            cx.beginPath(); cx.arc(it.x, it.y, 6, 0, 7); cx.fill();
            if(Math.hypot(p.x-it.x, p.y-it.y)<30){ p.res[it.t]++; items.splice(i,1); spI(); updUI(); }
        });

        // Пули
        bullets.forEach((b,i)=>{
            b.x+=b.vx; b.y+=b.vy;
            cx.fillStyle='#ff0'; cx.beginPath(); cx.arc(b.x, b.y, b.r?6:3, 0, 7); cx.fill();
            sharks.forEach((s,si)=>{
                if(Math.hypot(b.x-s.x, b.y-s.y)<35){ 
                    bullets.splice(i,1); sharks.splice(si,1); 
                    if(b.r) exps.push({x:s.x, y:s.y, r:0}); // Взрыв ракеты
                }
            });
        });

        // Взрывы
        exps.forEach((e,i)=>{ e.r+=4; cx.fillStyle='rgba(255,100,0,0.5)'; cx.beginPath(); cx.arc(e.x, e.y, e.r, 0, 7); cx.fill();
            sharks.forEach((s,si)=>{ if(Math.hypot(e.x-s.x, e.y-s.y)<e.r) sharks.splice(si,1); });
            if(e.r>90) exps.splice(i,1);
        });

        // Акулы
        sharks.forEach((s,i)=>{
            let a=Math.atan2(p.y-s.y, p.x-s.x); s.x+=Math.cos(a)*1.5; s.y+=Math.sin(a)*1.5;
            cx.fillStyle='#555'; cx.fillRect(s.x-15, s.y-5, 30, 10);
            if(Math.hypot(p.x-s.x, p.y-s.y)<25){ p.ox-=30; sharks.splice(i,1); }
        });

        // Игрок
        p.x = Math.max(15, Math.min(cv.width-15, p.x+joy.x*5));
        p.y = Math.max(15, Math.min(cv.height-15, p.y+joy.y*5));
        
        let rate = (p.bio==1 && !p.u.ht) ? 0.25 : 0.05; // Холод убивает без обогревателя
        p.ox = p.y<70 ? Math.min(100, p.ox+1.5) : p.ox-rate;
        if(p.ox<=0){ alert('Гейм Овер! Ресурсы утеряны.'); p.ox=100; p.y=50; sharks=[]; p.res={m:0,q:0,t:0,g:0,c:0}; }
        updUI();

        // Пасхалка
        if(p.x<sec.x+40 && p.y>sec.y){ document.getElementById('horror').style.display='flex'; setTimeout(()=>location.reload(), 2000); return; }

        cx.fillStyle='#f1c40f'; cx.fillRect(p.x-12, p.y-10, 24, 20); // Лодка
        if(p.u.w==1){ cx.fillStyle='#fff'; cx.fillRect(p.x, p.y, 25, 2); } // Копье торчит
        
        requestAnimationFrame(draw);
    }
    draw();
</script>
</body>
</html>
