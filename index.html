<!DOCTYPE html>
<html>
<head>
    <style>
        /* Сброс стилей для почты */
        body { margin: 0; padding: 0; background-color: #050505; }
        
        .game-wrapper {
            width: 100%;
            max-width: 400px;
            margin: 20px auto;
            background: #000;
            position: relative;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            border: 2px solid #0ff;
            box-shadow: 0 0 15px #0ff;
        }

        .header {
            color: #0ff;
            text-align: center;
            padding: 10px;
            text-transform: uppercase;
            text-shadow: 0 0 5px #0ff;
        }

        /* Зона лабиринта */
        .maze-container {
            position: relative;
            width: 300px;
            height: 400px;
            margin: 0 auto;
            background: #000;
        }

        /* Стены-ловушки */
        .wall {
            position: absolute;
            background: #f0f;
            box-shadow: 0 0 10px #f0f, inset 0 0 5px #fff;
            transition: opacity 0.1s;
            z-index: 5;
        }

        /* Логика проигрыша через hover (для ПК) и активные зоны (для мобильных) */
        .wall:hover {
            opacity: 1;
            background: #ff0000;
            box-shadow: 0 0 20px #ff0000;
        }

        /* Экран смерти (появляется при наведении на стену) */
        .death-zone {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 0, 0, 0.8);
            display: none;
            z-index: 20;
            color: white;
            text-align: center;
            padding-top: 150px;
        }

        /* Сложная трасса */
        .w1 { top: 0; left: 0; width: 100px; height: 400px; } /* Левый блок */
        .w2 { top: 0; right: 0; width: 100px; height: 400px; } /* Правый блок */
        .w3 { top: 150px; left: 100px; width: 50px; height: 20px; } /* Преграда 1 */
        .w4 { top: 250px; left: 150px; width: 50px; height: 20px; } /* Преграда 2 */

        /* Путь, по которому надо идти */
        .path {
            position: absolute;
            top: 0; left: 100px;
            width: 100px; height: 400px;
            background: rgba(0, 255, 255, 0.05);
            z-index: 1;
        }

        /* Кнопка финиша */
        .finish-trigger {
            position: absolute;
            bottom: 10px;
            left: 125px;
            width: 50px;
            height: 50px;
            background: #0f0;
            border-radius: 50%;
            box-shadow: 0 0 20px #0f0;
            z-index: 10;
            cursor: pointer;
            text-align: center;
            line-height: 50px;
            color: #000;
            font-weight: bold;
            text-decoration: none;
        }

        /* Чекбокс для победы */
        #win-cb { display: none; }
        #win-cb:checked ~ .win-overlay { display: block; }

        .win-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 50;
            display: none;
            color: #0f0;
            text-align: center;
            padding-top: 100px;
            border: 2px solid #0f0;
        }

        .neon-text {
            font-size: 24px;
            text-shadow: 0 0 10px #0f0;
        }
    </style>
</head>
<body>

<div class="game-wrapper">
    <input type="checkbox" id="win-cb">
    
    <div class="header">Neon Maze: Hardcore</div>
    
    <div class="maze-container">
        <div class="wall w1"></div>
        <div class="wall w2"></div>
        <div class="wall w3"></div>
        <div class="wall w4"></div>

        <div class="path"></div>

        <label for="win-cb" class="finish-trigger">WIN</label>

        <div class="win-overlay">
            <h1 class="neon-text">LEVEL COMPLETE</h1>
            <p style="color: #0ff;">Ты настоящий кибер-атлет!</p>
            <div style="margin-top: 50px; font-size: 12px; color: #555;">Code: NEON-ULTRA-2026</div>
        </div>
    </div>
</div>

</body>
</html>
